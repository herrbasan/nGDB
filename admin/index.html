<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="color-scheme" content="light dark">
	<base href="/admin/">
	<title>nGDB Admin</title>

	<!-- NUI Theme (REQUIRED) -->
	<link rel="stylesheet" href="NUI/NUI/css/nui-theme.css">
	<!-- NUI Addon CSS -->
	<link rel="stylesheet" href="NUI/NUI/css/modules/nui-list.css">
	<link rel="stylesheet" href="NUI/NUI/css/modules/nui-code-editor.css">

	<style>
		body { margin: 0; padding: 0; overflow: hidden; }
		nui-app:not(.nui-ready) { display: none; }
		nui-loading:not(.active) { display: none; }
	</style>

	<script type="module" src="js/main.js"></script>
</head>
<body>
	<nui-loading mode="bar"></nui-loading>

	<nui-app nui-vars-sidebar_width="15rem">
		<nui-skip-links></nui-skip-links>

		<nui-app-header>
			<div slot="left">
				<nui-button data-action="toggle-sidebar">
					<button type="button" aria-label="Toggle navigation menu">
						<nui-icon name="menu">☰</nui-icon>
					</button>
				</nui-button>
				<h1>nGDB Admin</h1>
			</div>
			<div slot="center">
				<nui-badge id="healthBadge" variant="success">Healthy</nui-badge>
			</div>
			<div slot="right">
				<nui-button data-action="toggle-theme">
					<button type="button" aria-label="Toggle light/dark theme">
						<nui-icon name="brightness">🌓</nui-icon>
					</button>
				</nui-button>
			</div>
		</nui-app-header>

		<nui-sidebar>
			<nui-link-list mode="fold"></nui-link-list>
		</nui-sidebar>

		<nui-content>
			<nui-main><!-- Pages load here --></nui-main>
		</nui-content>
	</nui-app>
</body>
</html>
