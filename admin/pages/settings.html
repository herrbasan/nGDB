<div class="page-settings">
	<header class="page-header">
		<h1>Settings</h1>
		<p class="lead">nGDB server configuration and runtime information</p>
	</header>

	<!-- Configuration Overview Cards -->
	<section class="stat-grid" id="configCards">
		<nui-card>
			<div class="stat-card">
				<nui-icon name="lock" class="stat-card__icon stat-card__icon--info">🔐</nui-icon>
				<div>
					<div class="stat-card__label">Authentication</div>
					<div class="stat-card__value" id="authStatus">—</div>
				</div>
			</div>
		</nui-card>

		<nui-card>
			<div class="stat-card">
				<nui-icon name="extension" class="stat-card__icon stat-card__icon--success">🔌</nui-icon>
				<div>
					<div class="stat-card__label">Admin UI</div>
					<div class="stat-card__value" id="adminStatus">—</div>
				</div>
			</div>
		</nui-card>

		<nui-card>
			<div class="stat-card">
				<nui-icon name="layers" class="stat-card__icon stat-card__icon--warning">🏢</nui-icon>
				<div>
					<div class="stat-card__label">Multi-Tenancy</div>
					<div class="stat-card__value" id="tenantStatus">—</div>
				</div>
			</div>
		</nui-card>
	</section>

	<!-- Detailed Configuration -->
	<section class="section">
		<nui-accordion>
			<details open>
				<summary>Server Configuration</summary>
				<div id="serverConfig" style="padding: 1rem;">
					<nui-progress indeterminate>Loading...</nui-progress>
				</div>
			</details>
			<details>
				<summary>Authentication</summary>
				<div id="authConfig" style="padding: 1rem;">
					<nui-progress indeterminate>Loading...</nui-progress>
				</div>
			</details>
			<details>
				<summary>Data Directories</summary>
				<div id="dataDirs" style="padding: 1rem;">
					<nui-progress indeterminate>Loading...</nui-progress>
				</div>
			</details>
			<details>
				<summary>Runtime Statistics</summary>
				<div id="runtimeStats" style="padding: 1rem;">
					<nui-progress indeterminate>Loading...</nui-progress>
				</div>
			</details>
			<details>
				<summary>Backend Modules</summary>
				<div id="backendModules" style="padding: 1rem;">
					<nui-progress indeterminate>Loading...</nui-progress>
				</div>
			</details>
		</nui-accordion>
	</section>

	<section class="section">
		<nui-button data-action="refresh-settings" variant="primary">
			<button type="button">↻ Refresh</button>
		</nui-button>
	</section>
</div>

<script type="nui/page">
function init(element, params, nui) {
	const { api } = window.ngdb;

	async function loadSettings() {
		try {
			const status = await api('/status');
			const config = status.config || {};

			// Config overview cards
			element.querySelector('#authStatus').textContent = config.hasApiKeys ? 'Secured' : 'Open';
			element.querySelector('#adminStatus').textContent = config.adminEnabled ? 'Enabled' : 'Disabled';
			element.querySelector('#tenantStatus').textContent = config.tenantHeader ? `Active (${config.tenantHeader})` : 'Disabled';

			// Server config
			element.querySelector('#serverConfig').innerHTML = `
				<div class="info-grid">
					<div class="info-row">
						<strong>Version:</strong>
						<span>${status.version || '—'}</span>
					</div>
					<div class="info-row">
						<strong>Admin Enabled:</strong>
						<span>${config.adminEnabled ? 'Yes' : 'No'}</span>
					</div>
					<div class="info-row">
						<strong>Node.js:</strong>
						<span>${process?.versions?.node || '—'}</span>
					</div>
					<div class="info-row">
						<strong>Platform:</strong>
						<span>${navigator?.platform || '—'}</span>
					</div>
				</div>
			`;

			// Auth config
			element.querySelector('#authConfig').innerHTML = `
				<div class="info-grid">
					<div class="info-row">
						<strong>API Keys:</strong>
						<span>${config.hasApiKeys ? 'Configured' : 'Not configured'}</span>
					</div>
					<div class="info-row">
						<strong>Local Bypass:</strong>
						<span>${config.localAuthBypass ? 'Enabled' : 'Disabled'}</span>
					</div>
					<div class="info-row">
						<strong>Tenant Header:</strong>
						<code>${config.tenantHeader || '—'}</code>
					</div>
				</div>
			`;

			// Data directories
			element.querySelector('#dataDirs').innerHTML = `
				<div class="info-grid">
					<div class="info-row">
						<strong>nDB Data Dir:</strong>
						<code>${escapeHtml(config.ndbDataDir || '—')}</code>
					</div>
					<div class="info-row">
						<strong>nVDB Data Dir:</strong>
						<code>${escapeHtml(config.nvdbDataDir || '—')}</code>
					</div>
				</div>
			`;

			// Runtime stats
			element.querySelector('#runtimeStats').innerHTML = `
				<div class="info-grid">
					<div class="info-row">
						<strong>Uptime:</strong>
						<span>${formatDuration(status.uptime || 0)}</span>
					</div>
					<div class="info-row">
						<strong>Connections:</strong>
						<span>${status.connections ?? 0}</span>
					</div>
					<div class="info-row">
						<strong>Subscriptions:</strong>
						<span>${status.subscriptions ?? 0}</span>
					</div>
					<div class="info-row">
						<strong>nDB Instances:</strong>
						<span>${status.backends?.ndbInstances ?? 0}</span>
					</div>
					<div class="info-row">
						<strong>nVDB Instances:</strong>
						<span>${status.backends?.nvdbInstances ?? 0}</span>
					</div>
					<div class="info-row">
						<strong>Collections:</strong>
						<span>${status.collections ?? 0}</span>
					</div>
				</div>
			`;

			// Backend modules
			element.querySelector('#backendModules').innerHTML = `
				<div class="info-grid">
					<div class="info-row">
						<strong>nDB:</strong>
						<nui-badge variant="${status.backends?.ndb === 'available' ? 'success' : 'danger'}">${status.backends?.ndb || 'unknown'}</nui-badge>
					</div>
					<div class="info-row">
						<strong>nVDB:</strong>
						<nui-badge variant="${status.backends?.nvdb === 'available' ? 'success' : 'danger'}">${status.backends?.nvdb || 'unknown'}</nui-badge>
					</div>
				</div>
			`;

		} catch (err) {
			const errorHtml = `<p style="color: var(--nui-danger);">Failed to load settings: ${escapeHtml(err.message)}</p>`;
			element.querySelector('#serverConfig').innerHTML = errorHtml;
			element.querySelector('#authConfig').innerHTML = errorHtml;
			element.querySelector('#dataDirs').innerHTML = errorHtml;
			element.querySelector('#runtimeStats').innerHTML = errorHtml;
			element.querySelector('#backendModules').innerHTML = errorHtml;
		}
	}

	function formatDuration(seconds) {
		const hours = Math.floor(seconds / 3600);
		const mins = Math.floor((seconds % 3600) / 60);
		const secs = Math.floor(seconds % 60);
		if (hours > 0) return `${hours}h ${mins}m ${secs}s`;
		if (mins > 0) return `${mins}m ${secs}s`;
		return `${secs}s`;
	}

	function escapeHtml(str) {
		if (str == null) return '';
		return String(str).replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"');
	}

	// Handle actions
	element.addEventListener('click', (e) => {
		const actionEl = e.target.closest('[data-action]');
		if (!actionEl) return;

		const action = actionEl.dataset.action;
		if (action === 'refresh-settings') {
			loadSettings();
		}
	});

	// Load initial data
	loadSettings();
}
</script>
