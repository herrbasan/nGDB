<div class="page-databases">
	<header>
		<h1>Databases</h1>
		<p class="lead">Manage open nDB document database instances</p>
	</header>

	<section>
		<nui-button-container>
			<nui-button data-action="open-database">
				<button type="button">+ Open Database</button>
			</nui-button>
		</nui-button-container>
	</section>

	<section class="list-container">
		<nui-list id="dbList"></nui-list>
	</section>

	<section id="dbDetail" class="detail-panel" style="display:none;">
		<h2 id="detailTitle">Database Details</h2>
		<nui-tabs>
			<menu>
				<button data-tab="info">Info</button>
				<button data-tab="indexes">Indexes</button>
				<button data-tab="actions">Actions</button>
			</menu>
			<section data-panel="info">
				<div id="dbInfo">Loading...</div>
			</section>
			<section data-panel="indexes">
				<div id="dbIndexes">Loading...</div>
			</section>
			<section data-panel="actions">
				<nui-button-container>
					<nui-button data-action="flush-db">
						<button type="button">Flush</button>
					</nui-button>
					<nui-button data-action="compact-db">
						<button type="button">Compact</button>
					</nui-button>
					<nui-button data-action="close-db">
						<button type="button">Close Database</button>
					</nui-button>
				</nui-button-container>
			</section>
		</nui-tabs>
	</section>
</div>

<style>
	.list-container {
		height: 300px;
		overflow: hidden;
	}
	.detail-panel {
		margin-top: 2rem;
		padding: 1rem;
		border: 1px solid var(--nui-border, #ddd);
		border-radius: var(--nui-radius, 6px);
	}
	.db-list-item {
		display: grid;
		grid-template-columns: 1fr 100px 120px;
		gap: 0.5rem;
		padding: 0.5rem;
		align-items: center;
	}
</style>

<script type="nui/page">
function init(element, params, nui) {
	nui = window.nui;
	const { api } = window.ngdb;

	let selectedHandle = null;
	let dbData = [];

	const dbList = element.querySelector('#dbList');

	async function loadDatabases() {
		try {
			const result = await api('/ndb/instances');
			dbData = result.instances || [];
			dbList.loadData({
				data: dbData,
				render: (item) => {
					return nui.util.dom.fromHTML(
						'<div class="db-list-item">' +
							'<div><nui-badge variant="info">' + item.handle.substring(0, 8) + '…</nui-badge></div>' +
							'<div>' + item.docCount + ' docs</div>' +
						'</div>'
					);
				},
				search: [{ prop: 'handle' }],
				sort: [
					{ label: 'Handle', prop: 'handle' },
					{ label: 'Documents', prop: 'docCount', numeric: true },
				],
				single: true,
				events: (e) => {
					if (e.type === 'selection') {
						const sel = dbList.getSelection(true);
						if (sel.length > 0) {
							// getSelection(true) returns [{data: originalItem}]
							showDetail(sel[0].data);
						}
					}
				},
			});
		} catch (err) {
			nui.components.banner.show({ content: 'Error loading databases: ' + err.message, priority: 'danger' });
		}
	}

	async function showDetail(db) {
		selectedHandle = db.handle;
		element.querySelector('#dbDetail').style.display = '';
		element.querySelector('#detailTitle').textContent = 'Database ' + db.handle.substring(0, 8) + '…';

		element.querySelector('#dbInfo').innerHTML =
			'<p><strong>Handle:</strong> <code>' + db.handle + '</code></p>' +
			'<p><strong>Path:</strong> <code>' + (db.path || '—') + '</code></p>' +
			'<p><strong>Documents:</strong> ' + db.docCount + '</p>';

		try {
			const idxResult = await api('/ndb/instances/' + db.handle + '/indexes');
			const indexes = idxResult.indexes || [];
			element.querySelector('#dbIndexes').innerHTML = indexes.length > 0
				? indexes.map(function(idx) { return '<p><nui-badge>' + idx.field + ' (' + idx.type + ')</nui-badge></p>'; }).join('')
				: '<p>No indexes</p>';
		} catch {
			element.querySelector('#dbIndexes').innerHTML = '<p>Could not load indexes</p>';
		}
	}

	element.addEventListener('click', async (e) => {
		const action = e.target.closest('[data-action]')?.dataset.action;
		if (!action) return;

		if (action === 'open-database') {
			const result = await nui.components.dialog.prompt('Open Database', 'Database path:', {
				fields: [{ id: 'path', label: 'Path', value: 'mydb' }]
			});
			if (result && result.path) {
				try {
					await api('/ndb/instances', { method: 'POST', body: JSON.stringify({ path: result.path }) });
					nui.components.banner.show({ content: 'Opened: ' + result.path, priority: 'success', autoClose: 3000 });
					loadDatabases();
				} catch (err) {
					nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
				}
			}
		}

		if (action === 'flush-db' && selectedHandle) {
			try {
				await api('/ndb/instances/' + selectedHandle + '/flush', { method: 'POST' });
				nui.components.banner.show({ content: 'Flushed', priority: 'success', autoClose: 2000 });
			} catch (err) {
				nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
			}
		}

		if (action === 'compact-db' && selectedHandle) {
			try {
				await api('/ndb/instances/' + selectedHandle + '/compact', { method: 'POST' });
				nui.components.banner.show({ content: 'Compacted', priority: 'success', autoClose: 2000 });
			} catch (err) {
				nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
			}
		}

		if (action === 'close-db' && selectedHandle) {
			const confirmed = await nui.components.dialog.confirm('Close Database', 'Are you sure? This will flush and close the database.');
			if (confirmed) {
				try {
					await api('/ndb/instances/' + selectedHandle, { method: 'DELETE' });
					nui.components.banner.show({ content: 'Database closed', priority: 'success', autoClose: 3000 });
					selectedHandle = null;
					element.querySelector('#dbDetail').style.display = 'none';
					loadDatabases();
				} catch (err) {
					nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
				}
			}
		}
	});

	loadDatabases();
}
</script>
