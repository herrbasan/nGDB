<div class="page-documents">
	<header>
		<h1>Documents</h1>
		<p class="lead">Browse and manage documents in nDB instances</p>
	</header>

	<section>
		<nui-input-group>
			<label>Database Handle</label>
			<nui-select id="handleSelect">
				<select></select>
			</nui-select>
		</nui-input-group>
	</section>

	<section>
		<nui-accordion>
			<details>
				<summary>Query Builder (AST)</summary>
				<nui-input-group>
					<label>AST Filter (JSON)</label>
					<nui-textarea id="queryAst">
						<textarea></textarea>
					</nui-textarea>
				</nui-input-group>
				<nui-button-container>
					<nui-button data-action="run-query">
						<button type="button">Run Query</button>
					</nui-button>
				</nui-button-container>
			</details>
		</nui-accordion>
	</section>

	<section class="list-container">
		<nui-list id="docList"></nui-list>
	</section>

	<section>
		<nui-button-container>
			<nui-button data-action="insert-doc">
				<button type="button">+ Insert Document</button>
			</nui-button>
			<nui-button data-action="delete-selected" variant="danger">
				<button type="button">Delete Selected</button>
			</nui-button>
		</nui-button-container>
	</section>

	<nui-dialog id="docDialog">
		<dialog>
			<div class="nui-dialog-alert">
				<div class="nui-headline">Document</div>
				<div class="nui-copy">
					<nui-code-editor id="docEditor" data-lang="json"></nui-code-editor>
				</div>
				<nui-button-container align="end">
					<nui-button data-action="cancel-doc"><button type="button">Cancel</button></nui-button>
					<nui-button variant="primary" data-action="save-doc"><button type="button">Save</button></nui-button>
				</nui-button-container>
			</div>
		</dialog>
	</nui-dialog>
</div>

<style>
	.list-container {
		height: 400px;
		overflow: hidden;
	}
	.doc-list-item {
		display: grid;
		grid-template-columns: 200px 1fr 80px;
		gap: 0.5rem;
		padding: 0.5rem;
		align-items: center;
		cursor: pointer;
	}
	.doc-list-item:hover {
		background: var(--nui-hover, rgba(0,0,0,0.04));
	}
	.doc-preview {
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
		font-family: monospace;
		font-size: 0.85rem;
	}
</style>

<script type="nui/page">
function init(element, params, nui) {
	nui = window.nui;
	const { api } = window.ngdb;
	const { fromHTML } = nui.util.dom;

	let currentHandle = null;
	let docData = [];
	let editingDocId = null;

	const handleSelect = element.querySelector('#handleSelect');
	const docList = element.querySelector('#docList');
	const docDialog = element.querySelector('#docDialog');
	const docEditor = element.querySelector('#docEditor');
	const queryTextarea = element.querySelector('#queryAst textarea');

	// Load available database instances
	async function loadHandles() {
		try {
			const result = await api('/ndb/instances');
			const instances = result.instances || [];
			handleSelect.setItems(instances.map(inst => ({
				value: inst.handle,
				label: inst.handle.substring(0, 8) + '… (' + inst.docCount + ' docs)'
			})));
		} catch (err) {
			nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
		}
	}

	async function loadDocuments(handle) {
		currentHandle = handle;
		if (!handle) return;

		try {
			const result = await api('/ndb/instances/' + handle + '/docs');
			docData = (result.docs || []).map(doc => ({
				id: doc._id || doc.id,
				data: doc,
				preview: JSON.stringify(doc).substring(0, 120),
			}));

			docList.loadData({
				data: docData,
				render: (item) => {
					return fromHTML(
						'<div class="doc-list-item">' +
							'<div><nui-badge>' + item.id + '</nui-badge></div>' +
							'<div class="doc-preview">' + item.preview + '</div>' +
							'<div>' +
								'<nui-button data-action="view-doc" data-doc-id="' + item.id + '">' +
									'<button type="button">Edit</button>' +
								'</nui-button>' +
							'</div>' +
						'</div>'
					);
				},
				search: [{ prop: 'id' }, { prop: 'preview' }],
				sort: [
					{ label: 'ID', prop: 'id' },
				],
				footer: {
					buttons_left: [
						{
							label: 'Delete Selected',
							type: 'danger',
							fnc: () => deleteSelected(),
						},
					],
					buttons_right: [
						{
							label: 'Total: ' + docData.length,
							type: 'outline',
							fnc: () => {},
						},
					],
				},
				events: (e) => {
					if (e.type === 'selection') {
						// Selection changed
					}
				},
			});
		} catch (err) {
			nui.components.banner.show({ content: 'Error loading documents: ' + err.message, priority: 'danger' });
		}
	}

	async function deleteSelected() {
		const selected = docList.getSelection(true);
		if (selected.length === 0) return;

		const confirmed = await nui.components.dialog.confirm(
			'Delete Documents',
			'Delete ' + selected.length + ' document(s)? This cannot be undone.'
		);
		if (!confirmed) return;

		for (const item of selected) {
			try {
				// getSelection(true) returns [{data: originalItem}]
				const docItem = item.data;
				await api('/ndb/instances/' + currentHandle + '/docs/' + docItem.id, { method: 'DELETE' });
			} catch (err) {
				nui.components.banner.show({ content: 'Error deleting: ' + err.message, priority: 'danger' });
			}
		}
		nui.components.banner.show({ content: 'Deleted ' + selected.length + ' document(s)', priority: 'success', autoClose: 3000 });
		loadDocuments(currentHandle);
	}

	// nui-select dispatches 'nui-change' custom event
	handleSelect.addEventListener('nui-change', () => {
		const val = handleSelect.getValue();
		loadDocuments(val);
	});

	element.addEventListener('click', async (e) => {
		const actionEl = e.target.closest('[data-action]');
		if (!actionEl) return;
		const action = actionEl.dataset.action;

		if (action === 'insert-doc') {
			if (!currentHandle) {
				nui.components.banner.show({ content: 'Select a database first', priority: 'warning' });
				return;
			}
			editingDocId = null;
			docEditor.value = '{\n  \n}';
			docDialog.showModal();
		}

		if (action === 'view-doc') {
			const docId = actionEl.dataset.docId;
			if (!currentHandle || !docId) return;
			editingDocId = docId;
			try {
				const result = await api('/ndb/instances/' + currentHandle + '/docs/' + docId);
				docEditor.value = JSON.stringify(result.doc, null, 2);
				docDialog.showModal();
			} catch (err) {
				nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
			}
		}

		if (action === 'save-doc') {
			try {
				const doc = JSON.parse(docEditor.value);
				if (editingDocId) {
					await api('/ndb/instances/' + currentHandle + '/docs/' + editingDocId, {
						method: 'PUT',
						body: JSON.stringify({ doc }),
					});
				} else {
					await api('/ndb/instances/' + currentHandle + '/docs', {
						method: 'POST',
						body: JSON.stringify({ doc }),
					});
				}
				docDialog.close();
				nui.components.banner.show({ content: 'Saved', priority: 'success', autoClose: 2000 });
				loadDocuments(currentHandle);
			} catch (err) {
				nui.components.banner.show({ content: 'Error: ' + err.message, priority: 'danger' });
			}
		}

		if (action === 'cancel-doc') {
			docDialog.close();
		}

		if (action === 'run-query') {
			if (!currentHandle) return;
			const astText = queryTextarea ? queryTextarea.value.trim() : '';
			if (!astText) {
				loadDocuments(currentHandle);
				return;
			}
			try {
				const ast = JSON.parse(astText);
				const result = await api('/ndb/instances/' + currentHandle + '/query', {
					method: 'POST',
					body: JSON.stringify({ ast, options: {} }),
				});
				docData = (result.results || []).map(doc => ({
					id: doc._id || doc.id,
					data: doc,
					preview: JSON.stringify(doc).substring(0, 120),
				}));
				docList.updateData(docData);
			} catch (err) {
				nui.components.banner.show({ content: 'Query error: ' + err.message, priority: 'danger' });
			}
		}
	});

	loadHandles();
}
</script>
