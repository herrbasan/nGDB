[package]
name = "ndb-node"
version = "0.1.0"
edition = "2021"
authors = ["ndb Contributors"]
description = "Node.js native bindings for ndb - human-readable document database"
license = "MIT OR Apache-2.0"
repository = "https://github.com/herrbasan/nDB"
keywords = ["document", "database", "nodejs", "native"]
categories = ["database", "external-ffi-bindings"]
rust-version = "1.75"

[lib]
crate-type = ["cdylib"]

[dependencies]
# napi-rs for Node.js bindings
napi = { version = "2.16", default-features = false, features = ["napi8", "serde-json"] }
napi-derive = "2.16"

# Core ndb library
ndb = { path = ".." }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
